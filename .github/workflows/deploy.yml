name: Deploy to FTP

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER_SUB }}
        username: ${{ secrets.FTP_USERNAME_SUB }}
        password: ${{ secrets.FTP_PASSWORD_SUB }}
        server-dir: /
        local-dir: ./
        exclude: |
          .git*
          .github/**
          node_modules/**
          .env