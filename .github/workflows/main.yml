name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    
    steps:
    - name: Get the latest code
      uses: actions/checkout@v4
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, ctype, iconv, intl, pdo, mysql, zip, curl
    
    - name: Install Composer dependencies
      run: composer install --no-dev --optimize-autoloader --no-interaction
    
    - name: Install lftp
      run: sudo apt-get update && sudo apt-get install -y lftp
    
    - name: Deploy with lftp
      run: |
        lftp -c "
        set ftp:ssl-allow false
        set ftp:passive-mode true
        set net:timeout 60
        set net:max-retries 10
        set net:reconnect-interval-base 5
        open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }}
        mirror -R -v -e --parallel=1 --exclude .git --exclude .github --exclude node_modules --exclude tests --exclude .env . /
        "
