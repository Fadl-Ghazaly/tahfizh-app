name: Deploy to FTP - Tahfizhapp Subdomain

on:
  push:
    branches: [ tahfizhapp ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
    
    - name: Install Composer dependencies (if exists)
      run: |
        if [ -f "composer.json" ]; then
          composer install --no-dev --optimize-autoloader
        fi
    
    - name: Deploy Tahfizhapp to FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER_SUB }}
        username: ${{ secrets.FTP_USERNAME_SUB }}
        password: ${{ secrets.FTP_PASSWORD_SUB }}
        server-dir: /
        local-dir: ./
        exclude: |
          .git*
          .github/**
          node_modules/**
          .env
          tests/
          phpunit.xml