name: Deploy to FTP - Tahfizhapp Subdomain

on:
  push:
    branches: [ tahfizhapp, main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, ctype, iconv, intl, pdo, mysql, zip, curl
    
    - name: Check PHP Version
      run: php -v
    
    - name: Install Composer dependencies
      run: composer install --no-dev --optimize-autoloader --no-interaction
    
    - name: Deploy to FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER_SUB }}
        username: ${{ secrets.FTP_USERNAME_SUB }}
        password: ${{ secrets.FTP_PASSWORD_SUB }}
        server-dir: /
        local-dir: ./
        exclude: |
          .git*
          .github/**
          node_modules/**
          tests/
          .env.*
          .env
          .gitignore
