name: Deploy Tahfizhapp via SFTP

on:
  push:
    branches: [ tahfizhapp, main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, ctype, iconv, intl, pdo, mysql, zip, curl
    
    - name: Install Composer dependencies
      run: composer install --no-dev --optimize-autoloader --no-interaction
    
    - name: Install SSH client
      run: sudo apt-get install -y sshpass
    
    - name: Deploy via SFTP
      run: |
        sshpass -p "${{ secrets.FTP_PASSWORD_SUB }}" sftp -o StrictHostKeyChecking=no -o ConnectTimeout=30 ${{ secrets.FTP_USERNAME_SUB }}@${{ secrets.FTP_SERVER_SUB }} <<EOF
        cd /
        put -r *
        exit
        EOF
